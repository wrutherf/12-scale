<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tire Size Chart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Tire Size Chart</h1>
    <nav>
      <a href="index.html" class="nav-link">Back to Calculator</a>
    </nav>
  </header>

  <section class="card">
    <div class="card-header">
      <h2>Tire Conversion Table</h2>
      <span class="collapse-arrow">▼</span>
    </div>

    <div class="card-content">
      <div class="tire-search">
        <label>Filter
          <input type="text" id="tireFilter" placeholder="e.g. 40.3">
        </label>
      </div>

      <div class="scroll-container">
        <table id="tireTable">
          <thead>
            <tr>
              <th>Diameter (mm)</th>
              <th>Diameter (in)</th>
            </tr>
          </thead>
          <tbody>
            <!-- table rows unchanged -->
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <script>
    // collapse behavior
    document.querySelectorAll(".collapsible .card-header").forEach(header => {
      header.addEventListener("click", () => {
        header.parentElement.classList.toggle("collapsed");
      });
    });

    // filter logic
    const tireFilter = document.getElementById("tireFilter");
    const tireTableBody = document.querySelector("#tireTable tbody");

    tireFilter.addEventListener("input", () => {
      const q = tireFilter.value.trim().toLowerCase();
      Array.from(tireTableBody.rows).forEach(row => {
        const mm = row.cells[0].textContent.toLowerCase();
        const inch = row.cells[1].textContent.toLowerCase();
        row.style.display = (!q || mm.includes(q) || inch.includes(q)) ? "" : "none";
      });
    });
  </script>

</body>
</html>
