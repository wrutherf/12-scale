<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tire Size Chart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Tire Size Chart</h1>
    <nav>
      <a href="index.html" class="nav-link">Back to Calculator</a>
    </nav>
  </header>

  <section class="card collapsible expanded">
    <div class="card-header">
      <h2>Tire Conversion & Status</h2>
      <span class="collapse-arrow">▼</span>
    </div>

    <div class="card-content">

      <div class="tire-toolbar">
        <label>Filter
          <input type="text" id="tireFilter" placeholder="e.g. 40.3">
        </label>

        <button id="exportTireJson">Export JSON</button>

        <label class="import-label">
          Import JSON
          <input type="file" id="importTireJson" accept="application/json" style="display:none;">
        </label>

        <button id="resetTireOverrides">Reset Overrides</button>
      </div>

      <div class="scroll-container">
        <table id="tireTable">
          <thead>
            <tr>
              <th>Diameter (mm)</th>
              <th>Diameter (in)</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <!-- rows built by JS -->
          </tbody>
        </table>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
