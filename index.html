<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rollout Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Rollout Calculator</h1>
    <nav>
      <a href="tires.html" class="nav-link">Tire Sets &amp; History</a>
    </nav>
  </header>

  <!-- ========================= -->
  <!-- GEARS & ROLLOUT CALCULATOR -->
  <!-- ========================= -->
  <section class="card collapsible expanded">
    <div class="card-header">
      <h2>Gearing &amp; Rollout</h2>
      <span class="collapse-arrow">▼</span>
    </div>

    <div class="card-content">

      <!-- RACER + TIRE SET INTEGRATION -->
      <div class="input-row inline">
        <label>Racer
          <select id="calcRacerSelect"></select>
        </label>

        <label>Tire Set
          <select id="calcTireSetSelect"></select>
        </label>

        <label>Tire Side
          <select id="calcTireSideSelect">
            <option value="LH">LH</option>
            <option value="RH">RH</option>
          </select>
        </label>
      </div>

      <!-- CORE CALCULATOR INPUTS -->
      <div class="input-row inline" style="margin-top: 10px;">
        <label>Spur
          <input type="number" id="spur" step="1">
        </label>

        <label>Pinion
          <input type="number" id="pinion" step="1">
        </label>

        <label>Tire Diameter
          <input type="number" id="tire" step="0.01">
          <div class="dual-unit">
            <span id="tirePrimary"></span>
            <span id="tireSecondary" class="secondary-unit"></span>
          </div>
          <span id="tireManualIndicator" class="secondary-unit"></span>
        </label>

        <label>Car
          <select id="car">
            <option value="a12x">A12X</option>
            <option value="generic">Generic</option>
          </select>
        </label>
      </div>

      <!-- TEETH RANGE + CENTER BUTTON -->
      <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
        <span id="teethRange"></span>
        <button id="centerBtn">Center on Current Gearing</button>
      </div>

      <!-- LOCAL GEARING MAP -->
      <div class="scroll-container" style="margin-top:10px;">
        <table id="localTable">
          <thead>
            <tr id="localHeadRow"></tr>
          </thead>
          <tbody id="localBody"></tbody>
        </table>
      </div>

    </div>
  </section>

  <!-- ========================= -->
  <!-- TARGET ROLLOUT + RECOMMENDED -->
  <!-- ========================= -->
  <section class="card collapsible expanded">
    <div class="card-header">
      <h2>Target Rollout &amp; Recommendations</h2>
      <span class="collapse-arrow">▼</span>
    </div>

    <div class="card-content">

      <div class="input-row inline">
        <label>Desired Rollout
          <input type="number" id="desiredRollout" step="0.001">
          <div class="dual-unit">
            <span id="desiredPrimary"></span>
            <span id="desiredSecondary" class="secondary-unit"></span>
          </div>
        </label>
      </div>

      <div class="scroll-container" style="margin-top:10px;">
        <table id="recommended">
          <thead>
            <tr>
              <th>Spur</th>
              <th>Pinion</th>
              <th>Total Teeth</th>
              <th>Rollout</th>
              <th>Δ from Desired (in)</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
