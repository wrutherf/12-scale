<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rollout Calculator</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  <h1>Rollout Calculator</h1>
</header>

<!-- =========================
     INPUTS
========================= -->
<section class="card">
  <h2>Inputs</h2>

  <div class="input-row">
    <label>
      Car
      <select id="car">
        <option value="a12">Awesomatix A12</option>
        <option value="a12x">Awesomatix A12X</option>
      </select>
    </label>

    <label>
      Tire Diameter
      <input type="number" id="tire" value="40" step="0.1">
    </label>
  </div>

  <div class="input-row">
    <label>
      Spur Teeth
      <input type="number" id="spur" value="65">
    </label>

    <label>
      Pinion Teeth
      <input type="number" id="pinion" value="49">
    </label>
  </div>
</section>

<!-- =========================
     ROLLOUT SUMMARY
========================= -->
<section class="card output">
  <h2>Current Rollout</h2>

  <div><strong>Rollout:</strong> <span id="rollout">—</span></div>
  <div><strong>Total Teeth:</strong> <span id="total">—</span></div>
  <div><strong>Legality:</strong> <span id="legal">—</span></div>
</section>

<!-- =========================
     LOCALIZED ±6 GEARING TABLE
========================= -->
<section class="card">
  <h2>Local Gearing Table (±6)</h2>

  <div class="scroll-container">
    <table id="localTable">
      <thead>
        <tr>
          <th>Spur ↓ / Pinion →</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>

<!-- =========================
     DESIRED ROLLOUT INPUT
========================= -->
<section class="card">
  <h2>Desired Rollout</h2>

  <div class="input-row">
    <label>
      Desired Rollout
      <input type="number" id="desiredRollout" value="90" step="0.01">
    </label>
  </div>
</section>

<!-- =========================
     RECOMMENDED GEARING TABLE
========================= -->
<section class="card">
  <h2>Recommended Gearing (Closest to Desired)</h2>

  <div class="scroll-container">
    <table id="recommended">
      <thead>
        <tr>
          <th>Spur</th>
          <th>Pinion</th>
          <th>Total</th>
          <th>Rollout</th>
          <th>Diff</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>

<script src="script.js"></script>

</body>
</html>
