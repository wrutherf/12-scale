<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rollout Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Rollout Calculator</h1>
    <nav>
      <a href="tires.html" class="nav-link">Tire Size Chart</a>
    </nav>
  </header>

  <!-- INPUTS CARD -->
  <section class="card collapsible expanded">
    <div class="card-header">
      <h2>Inputs</h2>
      <span class="collapse-arrow">▼</span>
    </div>
    <div class="card-content">
      <div class="input-row inline">
        <label>Spur
          <input type="number" id="spur" value="66">
        </label>
        <label>Pinion
          <input type="number" id="pinion" value="50">
        </label>
        <label>Tire Diameter
          <input type="number" id="tire" value="40.00" step="0.01">
          <div id="tireConverted" class="converted"></div>
        </label>
        <label>Car
          <select id="car">
            <option value="a12">A12</option>
            <option value="a12x">A12X</option>
          </select>
          <div class="teeth-range">Teeth Range: <span id="teethRange"></span></div>
        </label>
      </div>
    </div>
  </section>

  <!-- TARGET ROLLOUT CARD -->
  <section class="card collapsible expanded">
    <div class="card-header">
      <h2>Target Rollout</h2>
      <span class="collapse-arrow">▼</span>
    </div>
    <div class="card-content">
      <div class="input-row inline">
        <label>Desired Rollout
          <input type="number" id="desiredRollout" step="0.01">
        </label>
      </div>
    </div>
  </section>

  <!-- LOCAL GEARING MAP CARD -->
  <section class="card collapsible expanded">
    <div class="card-header">
      <h2>Local Gearing Map</h2>
      <span class="collapse-arrow">▼</span>
    </div>
    <div class="card-content">
      <button id="centerBtn" class="center-btn">Center on Current Gearing</button>

      <div class="local-scroll">
        <table id="localTable">
          <thead>
            <tr id="localHeadRow">
              <th class="sticky-corner">Spur ↓ / Pinion →</th>
            </tr>
          </thead>
          <tbody id="localBody"></tbody>
        </table>
      </div>

      <p class="hint">Use arrow keys to move the cursor. Press Enter or click a cell to commit gearing.</p>
    </div>
  </section>

  <!-- RECOMMENDED GEARING CARD -->
  <section class="card collapsible expanded">
    <div class="card-header">
      <h2>Recommended Gearing</h2>
      <span class="collapse-arrow">▼</span>
    </div>
    <div class="card-content">
      <div class="scroll-container">
        <table id="recommended">
          <thead>
            <tr>
              <th>Spur</th>
              <th>Pinion</th>
              <th>Total</th>
              <th>Rollout</th>
              <th>Δ to Desired</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
